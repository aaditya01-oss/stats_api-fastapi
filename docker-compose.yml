# docker-compose.yml
# Defines all the services (containers) your app needs.
# Run everything with: docker compose up
# Stop everything with: docker compose down


services:

  # ── Your API ──────────────────────────────────────────────────────
  api:
    # build: tells Compose to build from the Dockerfile in current dir
    # instead of pulling a pre-built image
    build: .

    # Map port 8000 on your machine to port 8000 in the container
    ports:
      - "8000:8000"

    # Automatically restart the container if it crashes
    restart: unless-stopped

    # Environment variables — injected into the container at runtime
    # Never hardcode secrets here in real projects (Month 7 covers this)
    environment:
      - APP_ENV=development

    # Mount your local code into the container for live reloading
    # Left side = your machine path, right side = container path
    # This means code changes reflect immediately without rebuilding
    volumes:
      - .:/app

    # Override the Dockerfile CMD for development
    # --reload makes uvicorn watch for file changes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    depends_on:
      - postgres

  # ── PostgreSQL database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    # We use the official PostgreSQL image — no Dockerfile needed
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      # Persist data even when container restarts
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  fraud_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    restart: unless-stopped
  # ── Apache Airflow ────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.9.0
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    volumes:
      # Mount your DAGs folder into Airflow
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    command: bash -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow webserver & airflow scheduler"
    restart: unless-stopped

  # ── NEW: MLflow tracking server ───────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --default-artifact-root /mlruns
    restart: unless-stopped
    networks:
      - default

  # ── ML training container ─────────────────────────────────────────
  trainer:
    build:
      context: .
      dockerfile: ml/Dockerfile.train
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - default
    profiles:
      - training


  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

# Named volume — persists database data between container restarts
volumes:
  postgres_data:

networks:
  default:
    driver: bridge