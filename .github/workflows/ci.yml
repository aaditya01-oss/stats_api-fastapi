# ci.yml — Continuous Integration pipeline
# Runs automatically on every push and every pull request to main

name: CI

# Triggers: when does this pipeline run?
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # The type of machine to run on (GitHub provides this for free)
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      # Step 1: checkout your code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: cache pip downloads
      # If requirements.txt hasn't changed, skip downloading packages
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      # Step 4: install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 5: run linter (checks code style)
      # ruff is faster than flake8 — catches formatting issues
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      # Step 6: run all tests
      # --tb=short shows shorter tracebacks on failure
      - name: Run tests
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: pytest tests/ -v --tb=short

  security:
    # This job only runs after the test job passes
    # No point scanning a broken image
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: build the Docker image
      # We tag it locally — only used for scanning, not pushed anywhere
      - name: Build Docker image
        run: docker build -t stats-api:ci .

      # Step 3: run Trivy vulnerability scanner
      # exit-code: 1 means the pipeline FAILS if CRITICAL or HIGH CVEs found
      # ignore-unfixed: skip CVEs with no fix available yet
      # .trivyignore handles known acceptable exceptions
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: stats-api:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore